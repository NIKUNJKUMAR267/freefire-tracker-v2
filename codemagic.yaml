workflows:
  android-debug-build:
    name: FreeFire Tracker APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Setup Gradle Wrapper
        script: |
          cd android-app
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Create google-services.json
        script: |
          cat > android-app/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "752856037565",
              "project_id": "live2win-92817",
              "storage_bucket": "live2win-92817.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:752856037565:android:94ffe1ef535ac3652c5fd4",
                  "android_client_info": {
                    "package_name": "com.livewin.freefiretracker"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyAPSE7q4Wv-7xlnUBRug-bmEzLMrlXY8AA"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
      - name: Build Debug APK
        script: |
          cd android-app
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android-app/app/build/outputs/**/*.apk
